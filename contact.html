    <main id="contact-form" class="section narrow">
      <article class="paper">
        <p class="form-status" data-contact-status hidden></p>

        <form class="form-grid" action="send-contact.php" method="post">
          <label>
            <span data-i18n="name">Name</span>
            <input type="text" name="name" autocomplete="name" required />
          </label>

          <label>
            <span data-i18n="email">Email</span>
            <input type="email" name="email" autocomplete="email" required />
          </label>

          <label>
            <span data-i18n="message">Message</span>
            <textarea name="message" required></textarea>
          </label>

          <button class="vintage-button" type="submit" data-i18n="sendDemo">Send message</button>
        </form>
      </article>
    </main>

  <script src="script.js"></script>
  <script>
    (function () {
      var status = document.querySelector("[data-contact-status]");
      if (!status) return;

      var contact = new URLSearchParams(window.location.search).get("contact");
      var messages = {
        sent: "Thank you. Your message has been sent.",
        error: "Sorry, the message could not be sent. Please check the form and try again.",
        validation: "Please complete all fields with a valid email address.",
        config: "The contact form SMTP login is not configured yet. Add the IONOS mailbox settings in contact-config.php.",
        mailerror: "The server could not send the email. Please check the IONOS mailbox settings.",
        smtpconnect: "The server could not connect to smtp.ionos.com. Check whether SMTP connections are allowed on this hosting package.",
        smtptls: "The server connected to IONOS but could not start TLS encryption.",
        smtpauth: "IONOS rejected the SMTP login. Check the mailbox address and password.",
        smtprejected: "IONOS rejected the email. Check that the sender mailbox exists and matches the SMTP login."
      };

      if (messages[contact]) {
        status.hidden = false;
        status.dataset.status = contact;
        status.textContent = messages[contact];
      }
    }());
  </script>
